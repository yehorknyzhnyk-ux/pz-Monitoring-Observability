zabbix_export:
  version: '7.0'
  host_groups:
    - uuid: dc579cd7a1a34222933f24f52a68bcd8
      name: 'Linux servers'
  hosts:
    - host: postman
      name: postman
      groups:
        - name: 'Linux servers'
      httptests:
        - name: postman
          steps:
            - name: postan
              url: 'http://postman:5000'
              follow_redirects: 'NO'
      inventory_mode: DISABLED
    - host: web1
      name: web1
      groups:
        - name: 'Linux servers'
      httptests:
        - name: 'Check Web1 Availability'
          steps:
            - name: 'Homepage Check'
              url: 'http://web1:5000'
              status_codes: '200'
      inventory_mode: DISABLED
    - host: web2
      name: web2
      groups:
        - name: 'Linux servers'
      httptests:
        - name: 'Web App Availability'
          steps:
            - name: 'Check Homepage'
              url: 'http://web2:5000'
              status_codes: '200'
      inventory_mode: DISABLED
  triggers:
    - expression: 'last(/postman/web.test.fail[postman],#1)=1'
      name: 'Container postman is DOWN'
      priority: HIGH
    - expression: 'last(/web1/web.test.fail[Check Web1 Availability],#1)=1'
      name: 'Container web1 is DOWN'
      priority: HIGH
    - expression: 'last(/web2/web.test.fail[Web App Availability],#1)=1'
      name: 'Container web2 is DOWN'
      priority: HIGH
