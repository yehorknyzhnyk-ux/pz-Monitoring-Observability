version: '3.8'

services:
  # --- MQTT БРОКЕР ---
  web3:
    image: eclipse-mosquitto:latest
    container_name: web3
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - monitoring_net
    restart: unless-stopped

  # --- ТВОЇ НОДИ (FLASK APP) ---
  postman:
    build: .
    container_name: postman
    command: python logger.py
    ports:
      - "8083:5000"
    depends_on:
      - web3
    networks:
      - monitoring_net
    restart: unless-stopped

  web1:
    build: .
    container_name: web1
    environment:
      - NODE_NAME=web1
      - MQTT_BROKER=web3
    ports:
      - "8081:5000"
    networks:
      - monitoring_net
    restart: unless-stopped

  web2:
    build: .
    container_name: web2
    environment:
      - NODE_NAME=web2
      - MQTT_BROKER=web3
    ports:
      - "8082:5000"
    networks:
      - monitoring_net
    restart: unless-stopped

  # --- ZABBIX INFRASTRUCTURE ---
  zabbix-db:
    image: postgres:15-alpine
    container_name: zabbix-db
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
      - POSTGRES_DB=zabbix
    volumes:
      - zabbix_db_data:/var/lib/postgresql/data
    networks:
      - monitoring_net
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
    container_name: zabbix-server
    ports:
      - "10051:10051"
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
      - ZBX_ENABLE_SNMP_TRAPS=true
    depends_on:
      - zabbix-db
    networks:
      - monitoring_net
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.0-latest
    container_name: zabbix-web
    ports:
      - "8080:8080"
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pass
      - PHP_TZ=Europe/Kyiv
    depends_on:
      - zabbix-server
    networks:
      - monitoring_net
    restart: unless-stopped

  # --- GRAFANA ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - zabbix-web
    networks:
      - monitoring_net
    restart: unless-stopped

# --- ГЛОБАЛЬНІ НАЛАШТУВАННЯ ---
volumes:
  zabbix_db_data:
  grafana_data:

networks:
  monitoring_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24